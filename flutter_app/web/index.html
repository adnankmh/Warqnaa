<body>
  <div id="install-card">
    <div class="mark"><img src="icons/Icon-192.png" alt="Warqnaa"></div>
    <div class="copy"><b>ثبّت تطبيق ورقنا</b><span>افتحه من الشاشة الرئيسية بملء الشاشة مثل التطبيق.</span></div>
    <button id="install-now">تثبيت</button><button id="install-close" aria-label="إغلاق">✕</button>
  </div>
  <div id="ios-tip"><button id="ios-close">✕</button><b>تثبيت ورقنا على iPhone</b><br>اضغط زر المشاركة في Safari ثم اختر «إضافة إلى الشاشة الرئيسية».</div>
  <script>
    let deferredInstallPrompt = null;
    const installCard = document.getElementById('install-card');
    const iosTip = document.getElementById('ios-tip');
    const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault(); deferredInstallPrompt = event;
      if (!standalone && localStorage.getItem('warqna-install-dismissed') !== '1') installCard.style.display='flex';
    });
    document.getElementById('install-now').addEventListener('click', async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt(); await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null; installCard.style.display='none';
    });
    document.getElementById('install-close').addEventListener('click', () => { installCard.style.display='none'; localStorage.setItem('warqna-install-dismissed','1'); });
    document.getElementById('ios-close').addEventListener('click', () => { iosTip.style.display='none'; localStorage.setItem('warqna-ios-dismissed','1'); });
    if (isIOS && !standalone && localStorage.getItem('warqna-ios-dismissed') !== '1') setTimeout(()=>iosTip.style.display='block',2500);
    window.addEventListener('appinstalled', () => { installCard.style.display='none'; iosTip.style.display='none'; });
  </script>
