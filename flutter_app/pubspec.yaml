name: warqna_mobile
publish_to: none
description: Warqna premium social card games app for Android, iOS and Web.
version: 0.2.0+176

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.1'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  http: ^1.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.2.3
  url_launcher: ^6.3.2
  google_mobile_ads: 7.0.0
  flutter_webrtc: 1.4.0
  permission_handler: ^12.0.3
  audioplayers: ^6.8.1
  flutter_local_notifications: ^22.0.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/design-reference.png
    - assets/images/pasha.png
    - assets/images/pasha/v173/
    - assets/images/games/
    - assets/images/tables/
    - assets/images/tables/v173/royal/
    - assets/images/tables/v173/showcase/
    - assets/images/cardbacks/v021/
    - assets/images/brand/
    - assets/images/v02/prize_boxes/
    - assets/images/v02/tickets/
    - assets/images/v02/rewards/
    - assets/sounds/
