services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      WARQNA_RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - warqna_storage:/var/www/html/storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - warqna_storage:/var/www/html/storage:ro

  queue:
    build: .
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=120 --max-time=3600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - warqna_storage:/var/www/html/storage

  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - warqna_storage:/var/www/html/storage

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-warqna}
      POSTGRES_USER: ${DB_USERNAME:-warqna}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - warqna_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-warqna} -d ${DB_DATABASE:-warqna}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - warqna_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  warqna_postgres:
  warqna_redis:
  warqna_storage:
