services:
  app:
    image: bitnami/laravel:latest
    working_dir: /app
    volumes: [".:/app"]
    ports: ["8088:8000"]
    environment:
      DB_HOST: mysql
      DB_DATABASE: warqna
      DB_USERNAME: warqna
      DB_PASSWORD: warqna
    depends_on: [mysql, redis]
    command: bash -lc "composer install && php artisan migrate --seed && php artisan serve --host=0.0.0.0 --port=8000"
  socket:
    image: node:20-alpine
    working_dir: /app
    volumes: [".:/app"]
    ports: ["4000:4000"]
    command: sh -lc "npm install && node server/index.js"
    depends_on: [redis, mysql]
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: warqna
      MYSQL_USER: warqna
      MYSQL_PASSWORD: warqna
      MYSQL_ROOT_PASSWORD: root
    ports: ["3307:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  mysql_data:
