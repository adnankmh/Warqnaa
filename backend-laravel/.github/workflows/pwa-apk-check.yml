name: PWA APK Readiness Check

on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - 'public/**'
      - 'package.json'
      - 'capacitor.config.json'
      - 'tools/pwa-check.js'
      - 'tools/mobile-app-check.js'
      - '.github/workflows/pwa-apk-check.yml'

jobs:
  pwa-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Node dependencies
        run: npm install

      - name: Run PWA readiness check
        run: npm run pwa:check

      - name: Validate Capacitor config
        run: npm run mobile:check
