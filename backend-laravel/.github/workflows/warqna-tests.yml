name: Warqna Tests

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax check
        run: find app config database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l
      - name: JS syntax check
        run: node --check public/assets/js/app.js
