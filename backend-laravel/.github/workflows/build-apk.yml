name: Build Warqna APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'app/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - 'tools/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, pdo, sqlite, pdo_sqlite, openssl, tokenizer, xml, ctype, json
          coverage: none

      - name: Install PHP dependencies if composer.json exists
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader
          fi

      - name: Prepare Laravel environment if needed
        run: |
          if [ -f artisan ]; then
            cp .env.example .env 2>/dev/null || true
            php artisan key:generate --force || true
            php artisan optimize:clear || true
          fi

      - name: Install Node dependencies
        run: npm install

      - name: Prepare Capacitor URL config
        env:
          WARQNA_APP_URL: ${{ vars.WARQNA_APP_URL || secrets.WARQNA_APP_URL }}
        run: |
          if [ -z "$WARQNA_APP_URL" ]; then
            echo "WARQNA_APP_URL is empty. For a real Laravel Android app, set Repository Variable or Secret WARQNA_APP_URL to your public HTTPS domain."
          fi
          npm run android:config

      - name: Check PWA and APK readiness
        run: npm run pwa:check

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Grant Gradle permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: warqna-zone-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Android build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warqna-android-build-logs
          path: |
            android/app/build/outputs/**
            android/build/reports/**
          if-no-files-found: ignore
