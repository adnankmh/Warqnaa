name: Build iOS unsigned
on:
  workflow_dispatch:
jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create iOS platform
        working-directory: flutter_app
        run: |
          flutter create . --platforms=ios --project-name warqna_mobile --org com.warqna
          if [ -f test/widget_test.dart ] && grep -q "MyApp" test/widget_test.dart; then rm test/widget_test.dart; fi
      - run: flutter pub get
        working-directory: flutter_app
      - name: Analyze and build unsigned iOS
        working-directory: flutter_app
        run: |
          API_URL="${{ vars.WARQNA_API_URL }}"
          EXTRA=""
          if [ -n "$API_URL" ]; then EXTRA="--dart-define=WARQNA_API_URL=$API_URL"; fi
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter test
          flutter build ios --release --no-codesign $EXTRA
      - uses: actions/upload-artifact@v4
        with:
          name: warqna-v145-ios-unsigned
          path: flutter_app/build/ios/iphoneos/Runner.app
