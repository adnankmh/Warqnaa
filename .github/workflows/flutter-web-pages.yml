name: Build and deploy Flutter Web

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate source package and reject merge markers
        run: python3 tools/validate_release.py

      - name: Install pinned Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Get Flutter packages
        working-directory: flutter_app
        run: flutter pub get

      - name: Verify corrected controller references
        working-directory: flutter_app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('lib/main.dart').read_text(encoding='utf-8')
          required = [
              "onPressed: () => showFriends(context, controller)",
              "onTap: () => showFriends(context, widget.controller)",
          ]
          missing = [item for item in required if item not in source]
          if missing:
              raise SystemExit('Incorrect controller references in lib/main.dart: ' + repr(missing))
          print('Controller references are correct.')
          PY

      - name: Analyze Flutter source
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run engine and widget tests
        working-directory: flutter_app
        run: flutter test

      - name: Build Flutter Web
        working-directory: flutter_app
        run: |
          API_URL="${{ vars.WARQNA_API_URL }}"
          EXTRA_ARGS=("--dart-define=WARQNA_APP_VERSION=1.57.0" "--dart-define=WARQNA_APP_BUILD=157")
          if [ -n "$API_URL" ]; then
            EXTRA_ARGS+=("--dart-define=WARQNA_API_URL=$API_URL" "--dart-define=WARQNA_PRODUCTION_MODE=true")
          else
            EXTRA_ARGS+=("--dart-define=WARQNA_PRODUCTION_MODE=false")
          fi
          flutter build web \
            --release \
            --base-href "/${{ github.event.repository.name }}/" \
            "${EXTRA_ARGS[@]}"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
