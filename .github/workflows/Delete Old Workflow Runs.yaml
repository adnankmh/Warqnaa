name: Delete Old Workflow Runs

on:
  workflow_dispatch: # هذا السطر هو المسؤول عن إظهار زر التشغيل اليدوي

# إضافة هذا القسم مهم جداً لمنح السكربت صلاحية حذف التشغيلات تلقائياً
permissions:
  actions: write
  contents: read

jobs:
  del_runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0 # الرقم 0 يعني حذف كافة التشغيلات السابقة بالكامل
          keep_minimum_runs: 0