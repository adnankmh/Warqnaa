name: Build Android APK and AAB

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load release metadata
        id: release
        run: python3 tools/release_metadata.py --github-output >> "$GITHUB_OUTPUT"

      - name: Validate source package and reject merge markers
        run: python3 tools/validate_release.py

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install pinned Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Create a clean Android platform
        working-directory: flutter_app
        run: |
          rm -rf android
          flutter create . \
            --platforms=android \
            --project-name warqna_mobile \
            --org com.warqna \
            --no-pub
          if [ -f test/widget_test.dart ] && grep -q "MyApp" test/widget_test.dart; then
            rm test/widget_test.dart
          fi
          python3 ../tools/apply_brand_assets.py

      - name: Install Android SDK 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Configure launch-safe Android project
        working-directory: flutter_app
        env:
          API_URL: ${{ vars.WARQNA_API_URL }}
        run: |
          python3 ../tools/configure_android_startup.py \
            --manifest android/app/src/main/AndroidManifest.xml \
            --app-id "" \
            --api-url "$API_URL" \
            --mode safe-apk

          python3 - <<'PYCODE'
          from pathlib import Path

          kotlin_gradle = Path('android/app/build.gradle.kts')
          groovy_gradle = Path('android/app/build.gradle')

          if kotlin_gradle.exists():
              gradle = kotlin_gradle.read_text(encoding='utf-8')
              gradle = gradle.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
              gradle = gradle.replace('minSdk = flutter.minSdkVersion', 'minSdk = 24')
              kotlin_gradle.write_text(gradle, encoding='utf-8')
          elif groovy_gradle.exists():
              gradle = groovy_gradle.read_text(encoding='utf-8')
              gradle = gradle.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 36')
              gradle = gradle.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 24')
              groovy_gradle.write_text(gradle, encoding='utf-8')
          else:
              raise SystemExit('No Android app Gradle file was generated')
          PYCODE

          GRADLE_FILE=android/app/build.gradle.kts
          if [ ! -f "$GRADLE_FILE" ]; then GRADLE_FILE=android/app/build.gradle; fi
          python3 ../tools/configure_android_workmanager_guard.py \
            --manifest android/app/src/main/AndroidManifest.xml \
            --gradle "$GRADLE_FILE"
          python3 ../tools/verify_android_startup.py \
            --manifest android/app/src/main/AndroidManifest.xml \
            --gradle "$GRADLE_FILE"

      - name: Resolve and verify Flutter packages
        working-directory: flutter_app
        run: |
          flutter clean
          flutter pub get
          python3 ../tools/verify_flutter_lock.py pubspec.lock \
            google_mobile_ads=7.0.0 \
            flutter_webrtc=1.4.0

      - name: Configure optional Google Play upload signing
        working-directory: flutter_app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Play signing secrets are not configured; producing a test-signed release artifact."
            exit 0
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          python3 ../.github/scripts/configure_android_signing.py

      - name: Analyze and test
        working-directory: flutter_app
        run: |
          python3 ../tools/test_flutter_ci_contract.py
          python3 ../tools/test_v170_contract.py
          python3 ../tools/test_v171_controller_references.py
          python3 ../tools/test_v172_brand_table_contract.py
          python3 ../tools/test_v173_online_engagement_contract.py
          python3 ../tools/test_v174_offline_progression_navigation_contract.py
          python3 ../tools/test_v175_xp_challenges_pasha_designer_contract.py
          python3 ../tools/test_v176_daily_pack_inventory_contract.py
          python3 ../tools/test_v02_daily_prize_boxes_contract.py
          bash ../tools/flutter_analyze_ci.sh
          flutter test

      - name: Build launch-safe test APK
        working-directory: flutter_app
        env:
          API_URL: ${{ vars.WARQNA_API_URL }}
          WARQNA_APP_VERSION: ${{ steps.release.outputs.version }}
          WARQNA_APP_BUILD: ${{ steps.release.outputs.build }}
          FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          EXTRA_ARGS=("--dart-define=WARQNA_APP_VERSION=$WARQNA_APP_VERSION" "--dart-define=WARQNA_APP_BUILD=$WARQNA_APP_BUILD")
          EXTRA_ARGS+=("--dart-define=FIREBASE_API_KEY=$FIREBASE_API_KEY" "--dart-define=FIREBASE_APP_ID=$FIREBASE_APP_ID" "--dart-define=FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID" "--dart-define=FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID")
          if [ -n "$API_URL" ]; then
            EXTRA_ARGS+=("--dart-define=WARQNA_API_URL=$API_URL" "--dart-define=WARQNA_PRODUCTION_MODE=true")
          else
            EXTRA_ARGS+=("--dart-define=WARQNA_PRODUCTION_MODE=false")
          fi
          EXTRA_ARGS+=("--dart-define=ADMOB_REWARDED_ANDROID_ID=ca-app-pub-3940256099942544/5224354917")

          mkdir -p "build/symbols/v${WARQNA_APP_BUILD}"
          flutter build apk --release --obfuscate --split-debug-info="build/symbols/v${WARQNA_APP_BUILD}" "${EXTRA_ARGS[@]}"
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/warqna-v${WARQNA_APP_BUILD}-safe.apk

      - name: Configure validated production advertising for Play AAB
        working-directory: flutter_app
        env:
          ADMOB_APP_ID: ${{ vars.ADMOB_ANDROID_APP_ID }}
          API_URL: ${{ vars.WARQNA_API_URL }}
        run: |
          python3 ../tools/configure_android_startup.py \
            --manifest android/app/src/main/AndroidManifest.xml \
            --app-id "$ADMOB_APP_ID" \
            --api-url "$API_URL" \
            --mode production-aab
          GRADLE_FILE=android/app/build.gradle.kts
          if [ ! -f "$GRADLE_FILE" ]; then GRADLE_FILE=android/app/build.gradle; fi
          python3 ../tools/configure_android_workmanager_guard.py \
            --manifest android/app/src/main/AndroidManifest.xml \
            --gradle "$GRADLE_FILE"
          python3 ../tools/verify_android_startup.py \
            --manifest android/app/src/main/AndroidManifest.xml \
            --gradle "$GRADLE_FILE"

      - name: Build Play AAB with validated ad identifiers
        working-directory: flutter_app
        env:
          API_URL: ${{ vars.WARQNA_API_URL }}
          REWARDED_ID: ${{ vars.ADMOB_REWARDED_ANDROID_ID }}
          WARQNA_APP_VERSION: ${{ steps.release.outputs.version }}
          WARQNA_APP_BUILD: ${{ steps.release.outputs.build }}
          FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          SAMPLE_REWARDED_ID="ca-app-pub-3940256099942544/5224354917"
          if [[ "$REWARDED_ID" =~ ^ca-app-pub-[0-9]{16}/[0-9]{10}$ ]]; then
            SAFE_REWARDED_ID="$REWARDED_ID"
            echo "Using validated production rewarded ad unit for AAB."
          else
            SAFE_REWARDED_ID="$SAMPLE_REWARDED_ID"
            echo "Production rewarded ad unit is absent or malformed; using Google's sample unit."
          fi

          EXTRA_ARGS=("--dart-define=WARQNA_APP_VERSION=$WARQNA_APP_VERSION" "--dart-define=WARQNA_APP_BUILD=$WARQNA_APP_BUILD")
          EXTRA_ARGS+=("--dart-define=FIREBASE_API_KEY=$FIREBASE_API_KEY" "--dart-define=FIREBASE_APP_ID=$FIREBASE_APP_ID" "--dart-define=FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID" "--dart-define=FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID")
          if [ -n "$API_URL" ]; then
            EXTRA_ARGS+=("--dart-define=WARQNA_API_URL=$API_URL" "--dart-define=WARQNA_PRODUCTION_MODE=true")
          else
            EXTRA_ARGS+=("--dart-define=WARQNA_PRODUCTION_MODE=false")
          fi
          EXTRA_ARGS+=("--dart-define=ADMOB_REWARDED_ANDROID_ID=$SAFE_REWARDED_ID")
          mkdir -p "build/symbols/v${WARQNA_APP_BUILD}"
          flutter build appbundle --release --obfuscate --split-debug-info="build/symbols/v${WARQNA_APP_BUILD}" "${EXTRA_ARGS[@]}"

      - name: Verify Android artifacts and generate checksums
        working-directory: flutter_app
        run: |
          APK="build/app/outputs/flutter-apk/warqna-v${{ steps.release.outputs.build }}-safe.apk"
          AAB="build/app/outputs/bundle/release/app-release.aab"
          unzip -t "$APK" >/dev/null
          unzip -t "$AAB" >/dev/null
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
          sha256sum "$APK" > "$APK.sha256"
          sha256sum "$AAB" > "$AAB.sha256"

      - name: Upload launch-safe APK and Play AAB
        uses: actions/upload-artifact@v6
        with:
          name: warqna-v${{ steps.release.outputs.build }}-android
          if-no-files-found: error
          retention-days: 14
          path: |
            flutter_app/build/app/outputs/flutter-apk/warqna-v${{ steps.release.outputs.build }}-safe.apk
            flutter_app/build/app/outputs/flutter-apk/warqna-v${{ steps.release.outputs.build }}-safe.apk.sha256
            flutter_app/build/app/outputs/bundle/release/app-release.aab
            flutter_app/build/app/outputs/bundle/release/app-release.aab.sha256
            flutter_app/build/symbols/**
