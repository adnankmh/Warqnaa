name: Bug report
description: Report a reproducible Warqna defect
title: "[Bug] "
labels: [bug, triage]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Web, Android, iOS, Backend, GitHub Actions]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version and build
      placeholder: "0.2.5+181"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Device/environment
      placeholder: "Windows version, browser/device, Flutter/PHP version"
