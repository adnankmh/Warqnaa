name: Feature request
description: Propose a bounded product improvement
title: "[Feature] "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Player or operational problem
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired measurable outcome
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options: [Gameplay, Challenges, Store, Social, Voice, Admin, Backend, Infrastructure, Accessibility, Localization]
    validations:
      required: true
